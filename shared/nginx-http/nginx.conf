This concludes the large response for TCP segmentation analysis. Total size should exceed 4000 bytes.
If you apply the filter tcp.len > 0 in Wireshark, you should see multiple TCP segments carrying this data.
Each segment will have different sequence numbers, and the TCP layer reassembles them into a single HTTP response.
This is exactly what happens in real networks when transferring files, images, or large API responses.';
        }

        location /redirect {
            return 302 /;
        }

        location /headers {
            default_type application/json;
            add_header X-Custom-Header "shark-tank-lab";
            add_header X-Powered-By "nginx";
            add_header X-Request-ID "abc-123-def-456";
            return 200 '{"message":"check the response headers"}';
        }

        error_page 404 /404.html;
        location = /404.html {
            default_type text/html;
            return 404 '<html><body><h1>404 Not Found</h1></body></html>';
        }
    }
}
