events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name web.shark-tank.local _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /api/data {
            default_type application/json;
            return 200 '{"status":"ok","data":"hello from shark-tank","server":"web-01"}';
        }

        location /api/users {
            default_type application/json;
            return 200 '{"users":[{"id":1,"name":"alice"},{"id":2,"name":"bob"},{"id":3,"name":"charlie"}]}';
        }

        location /login {
            default_type text/html;
            return 200 '<!DOCTYPE html><html><body><h1>Login</h1><form method="POST" action="/auth"><input name="username" placeholder="User"/><br><input name="password" type="password" placeholder="Pass"/><br><button type="submit">Login</button></form></body></html>';
        }

        location /auth {
            default_type application/json;
            return 200 '{"status":"authenticated"}';
        }

        location /secret {
            return 403 '<html><body><h1>403 Forbidden</h1><p>Access Denied - Admin only</p></body></html>';
        }

        location /large {
            default_type text/plain;
            return 200 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
This is a large response body designed to demonstrate TCP segmentation and reassembly in Wireshark.
When you capture this traffic, you will see how a large HTTP response is split across multiple TCP segments.
Each segment carries a portion of the data, and Wireshark reassembles them to show the complete HTTP response.
This helps you understand Maximum Segment Size (MSS), TCP sequence numbers, and how data flows in chunks.
The TCP layer breaks data into segments that fit within the MSS negotiated during the 3-way handshake.
