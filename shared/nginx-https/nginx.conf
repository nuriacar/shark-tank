events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 443 ssl;
        server_name secure.shark-tank.local _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!3DES;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /secure-api {
            default_type application/json;
            return 200 '{"encrypted":true,"message":"Bu veri TLS ile şifrelenmiş olarak iletilmistir","timestamp":"2024-01-01T12:00:00Z"}';
        }

        location /secure-data {
            default_type application/json;
            return 200 '{"secret":"flag{tls_analysis_complete}","user":"admin","role":"administrator"}';
        }

        location /cert-info {
            default_type application/json;
            return 200 '{"info":"Check the TLS certificate details in Wireshark","cn":"secure.shark-tank.local","issuer":"Shark-Tank Network Lab"}';
        }
    }
}
